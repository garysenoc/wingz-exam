[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "N",    # pep8-naming
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["rides", "wingz"]

[tool.mypy]
python_version = "3.13"
plugins = [
    "mypy_django_plugin.main",
    "mypy_drf_plugin.main",
]
strict = false
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "rides.tests.*"
disallow_untyped_defs = false
disable_error_code = ["no-untyped-call", "arg-type", "attr-defined", "return-value", "union-attr", "misc"]

[[tool.mypy.overrides]]
module = "rides.admin"
disable_error_code = ["assignment", "misc", "operator", "type-arg"]

[[tool.mypy.overrides]]
module = "wingz.*"
disallow_untyped_defs = false
disable_error_code = ["var-annotated"]

[tool.django-stubs]
django_settings_module = "wingz.settings"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
schema_pattern = "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(.+\\))?!?:\\s.+"
